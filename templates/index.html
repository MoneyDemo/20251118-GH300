<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 待辦事項</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 TODO 待辦事項</h1>
            <p class="subtitle">使用 Python + Flask 與 In-Memory 資料庫</p>
        </header>

        <div class="todo-form">
            <h2>新增待辦事項</h2>
            <form id="addTodoForm">
                <div class="form-group">
                    <input type="text" id="todoTitle" placeholder="輸入待辦事項標題..." required>
                </div>
                <div class="form-group">
                    <textarea id="todoDescription" placeholder="輸入描述 (選填)..." rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">新增</button>
            </form>
        </div>

        <div class="todo-stats">
            <span>總共: <strong id="totalCount">0</strong></span>
            <span>待完成: <strong id="pendingCount">0</strong></span>
            <span>已完成: <strong id="completedCount">0</strong></span>
        </div>

        <div class="todo-list">
            <h2>待辦清單</h2>
            <div id="todoItems">
                <!-- Todo items will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Load todos on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTodos();
        });

        // Add todo form submission
        document.getElementById('addTodoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('todoTitle').value;
            const description = document.getElementById('todoDescription').value;
            
            try {
                const response = await fetch('/api/todos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, description })
                });
                
                if (response.ok) {
                    document.getElementById('todoTitle').value = '';
                    document.getElementById('todoDescription').value = '';
                    loadTodos();
                }
            } catch (error) {
                console.error('Error adding todo:', error);
                alert('新增失敗，請稍後再試');
            }
        });

        // Load todos from API
        async function loadTodos() {
            try {
                const response = await fetch('/api/todos');
                const todos = await response.json();
                
                displayTodos(todos);
                updateStats(todos);
            } catch (error) {
                console.error('Error loading todos:', error);
            }
        }

        // Display todos
        function displayTodos(todos) {
            const container = document.getElementById('todoItems');
            
            if (todos.length === 0) {
                container.innerHTML = '<p class="empty-message">還沒有待辦事項，請新增一個吧！</p>';
                return;
            }
            
            container.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="todo-content">
                        <div class="todo-header">
                            <input type="checkbox" 
                                   ${todo.completed ? 'checked' : ''} 
                                   onchange="toggleTodo('${todo.id}')"
                                   class="todo-checkbox">
                            <h3 class="todo-title">${escapeHtml(todo.title)}</h3>
                        </div>
                        ${todo.description ? `<p class="todo-description">${escapeHtml(todo.description)}</p>` : ''}
                        <small class="todo-date">建立時間: ${new Date(todo.created_at).toLocaleString('zh-TW')}</small>
                    </div>
                    <div class="todo-actions">
                        <button onclick="editTodo('${todo.id}')" class="btn btn-edit">編輯</button>
                        <button onclick="deleteTodo('${todo.id}')" class="btn btn-delete">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics
        function updateStats(todos) {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Toggle todo completion
        async function toggleTodo(id) {
            try {
                await fetch(`/api/todos/${id}/toggle`, {
                    method: 'POST'
                });
                loadTodos();
            } catch (error) {
                console.error('Error toggling todo:', error);
            }
        }

        // Delete todo
        async function deleteTodo(id) {
            if (!confirm('確定要刪除這個待辦事項嗎？')) {
                return;
            }
            
            try {
                await fetch(`/api/todos/${id}`, {
                    method: 'DELETE'
                });
                loadTodos();
            } catch (error) {
                console.error('Error deleting todo:', error);
            }
        }

        // Edit todo
        async function editTodo(id) {
            const newTitle = prompt('輸入新標題:');
            if (!newTitle) return;
            
            const newDescription = prompt('輸入新描述 (選填):');
            
            try {
                await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        title: newTitle, 
                        description: newDescription || '' 
                    })
                });
                loadTodos();
            } catch (error) {
                console.error('Error editing todo:', error);
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
